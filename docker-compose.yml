version: "3.8"

services:

  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    env_file:
      - .env

  mysql:
    image: mysql:8
    container_name: contatos_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contatos_db

    ports:
      - "3306:3306"

    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql